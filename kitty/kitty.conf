# ╔══════════════════════════════════════╗
# ║         KITTY CONFIG - svfabio       ║
# ╚══════════════════════════════════════╝

# ── Fuente ──────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        12.0
adjust_line_height  2
session_name "main"
disable_ligatures never

# ── Cursor ──────────────────────────────
cursor                  #E00000
cursor_shape            underline
cursor_blink_interval   0.3
cursor_stop_blinking_after 0

# ── Colores ─────────────────────────────
background              #0D0D0D
foreground              #F5E6D3
selection_background    #E00000
selection_foreground    #FFFFFF

# Negro
color0  #1A1A1A
color8  #444444

# Rojo
color1  #CC0000
color9  #E00000

# Verde
color2  #59C9A5
color10 #6FDDBB

# Amarillo
color3  #F3AE35
color11 #FFBF00

# Azul
color4  #4B95E9
color12 #6AAFF0

# Magenta
color5  #9B1111
color13 #CC2222

# Cyan
color6  #7FD5EA
color14 #A0E8F5

# Blanco
color7  #F5E6D3
color15 #FFFFFF

# ── Ventana ─────────────────────────────
background_opacity          0.85
dynamic_background_opacity  yes
hide_window_decorations     titlebar-only
window_padding_width        8
placement_strategy          center

# Bordes de ventana
active_border_color     #E00000
inactive_border_color   #333333

# ── Tabs ────────────────────────────────
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            1
active_tab_background       #E00000
active_tab_foreground       #F5E6D3
active_tab_font_style       bold
inactive_tab_background     #1E1E1E
inactive_tab_foreground     #888888
inactive_tab_font_style     normal
tab_title_template          " {index}: {title} "

# ── Scrollback ──────────────────────────
scrollback_lines        10000
scrollback_pager_history_size 100

# ── Mouse ───────────────────────────────
mouse_hide_wait         3.0
copy_on_select          yes
focus_follows_mouse     yes

# ── Rendimiento ─────────────────────────
repaint_delay   8
input_delay     2
sync_to_monitor yes

# ── Atajos ──────────────────────────────
# Tabs
map ctrl+shift+t    new_tab
map ctrl+shift+w    close_tab
map ctrl+shift+l    next_tab
map ctrl+shift+h    previous_tab
map ctrl+shift+r    set_tab_title

# Paneles
map ctrl+shift+enter    new_window
map ctrl+shift+x        close_window
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Splits
map ctrl+shift+d        launch --location=hsplit
map ctrl+shift+v        launch --location=vsplit

# Fuente
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Transparencia
map ctrl+shift+a>m      set_background_opacity +0.1
map ctrl+shift+a>l      set_background_opacity -0.1

# Copiar/Pegar
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
